---
version: "3"

# This task creates or updates a git repository checkout. It pulls
# the latest changees and ensures the latest 10 commits are indexed
# in the database by providing a list of them as JSON.

tasks:
  default:
    requires:
      vars: [repository]
    cmds:
      - task: commits:checkout
      - task: commits:list

  commits:checkout:
    status:
      - test -d src/.git
    cmds:
      - git clone {{.repository}} src
      - mkdir -p output/
      - touch output/.placeholder

  commits:list:
    dir: src
    cmds:
      - git pull -q
      - |-
          git log -n 10 --pretty=format:"%H" | jq -R . | jq -s 'map({commit_id: ., repository: "{{.repository}}"})' -r
