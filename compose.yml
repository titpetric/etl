include:
  - docker/service/mysql-percona.yml
  - docker/service/postgres.yml

services:
  etl:
    image: titpetric/etl
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - $PWD/tests/petstore:/app
    depends_on:
      mysql-percona:
        condition: service_healthy
      postgres:
        condition: service_healthy
